    <!-- Service Worker Registration and Core Scripts -->
    <script>
      // Critical path: Set year, remove loading, and register service worker
      (function() {
        // Set current year
        const yearEl = document.getElementById('year');
        if (yearEl) yearEl.textContent = new Date().getFullYear();
        
        // Remove loading class when page is fully loaded
        window.addEventListener('load', function() {
          document.body.classList.remove('loading');
        });

        // Register Service Worker for PWA functionality
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            // Determine the correct path and scope for service worker
            const isGitHubPages = window.location.hostname === 'lucascaixeta.github.io';
            const basePath = isGitHubPages ? '/lucas_caixeta' : '';
            const swPath = basePath + '/sw.js';
            const swScope = isGitHubPages ? '/lucas_caixeta/' : '/';
            
            navigator.serviceWorker.register(swPath, { scope: swScope })
              .then(registration => {
                console.log('Service Worker registered:', registration.scope);
                
                // Check for updates
                registration.addEventListener('updatefound', () => {
                  const newWorker = registration.installing;
                  console.log('Service Worker update found');
                  
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      console.log('New Service Worker available. Refresh to update.');
                    }
                  });
                });
              })
              .catch(error => {
                console.warn('Service Worker registration failed:', error);
              });
          });
        }
      })();
    </script>

    <!-- Progressive Enhancement: Touch and keyboard handling -->
    <script>
      // Handle touch events for better mobile experience
      (function() {
        let touchStartY = 0;
        
        document.addEventListener('touchstart', function(e) {
          touchStartY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchmove', function(e) {
          const touchEndY = e.touches[0].clientY;
          const deltaY = touchStartY - touchEndY;
          
          // Prevent pull-to-refresh on iOS
          if (deltaY < 0 && window.scrollY === 0) {
            e.preventDefault();
          }
        }, { passive: false });

        // Handle orientation change
        window.addEventListener('orientationchange', function() {
          window.scrollTo(0, 0);
        });

        // Add keyboard navigation support for accessibility
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Tab') {
            document.body.classList.add('keyboard-navigation');
          }
        });

        document.addEventListener('mousedown', function() {
          document.body.classList.remove('keyboard-navigation');
        });
      })();
    </script>

    <!-- No-script fallback for accessibility -->
