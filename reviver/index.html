<!DOCTYPE html>
<html>
  <head>
    <!--Import Google Icon Font-->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <!--Import materialize.css-->
    <link
      type="text/css"
      rel="stylesheet"
      href="dist/css/materialize.min.css"
      media="screen,projection"
    />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <meta
      name="viewport"
      content="user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width"
    />
    <title>Igreja Reviver Sac - Inscrições</title>
    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      a {
        font-family: "Gill Sans", "Gill Sans MT", "Calibri", "Trebuchet MS",
          sans-serif !important;
      }
      .container {
        font-family: "Gill Sans", "Gill Sans MT", "Calibri", "Trebuchet MS",
          sans-serif !important;
        position: absolute;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 170px;
        flex-direction: column;
        color: black;
      }

      .buttons {
        margin: 0 20px;
      }

      .container .title {
        font-family: "Gill Sans", "Gill Sans MT", "Calibri", "Trebuchet MS",
          sans-serif !important;
        margin-right: 20px 20px 3px 20px;
        margin-bottom: -12px;
        color: white;
      }

      /* On screens that are 600px or less, set the background color to olive */
      @media screen and (max-width: 600px) {
        .container .title h2 {
          font-size: 46px;
          margin: 20px;
        }
      }

      /* On screens that are 600px or less, set the background color to olive */
      @media screen and (max-width: 400px) {
        .container .title h2 {
          font-size: 30px;
          margin: 20px;
        }
      }

      .container .button {
        display: flex;
        font-family: "Gill Sans", "Gill Sans MT", "Calibri", "Trebuchet MS",
          sans-serif !important;
        width: 100%;
        font-size: 14px !important;
        justify-content: space-between;
        margin-top: 14px;
      }

      .btn-large,
      .btn-large:hover,
      .btn-large:focus {
        font-family: "Gill Sans", "Gill Sans MT", "Calibri", "Trebuchet MS",
          sans-serif !important;
        background-color: white;
        color: black;
        font-size: 14px !important;
        font-weight: 600;
        padding: 0 20px;
      }

      .btn-large:hover,
      .btn-large:focus {
        background-color: rgb(211, 211, 211);
      }
    </style>
  </head>

  <body
    style="
      font-family: 'Gill Sans', 'Gill Sans MT', 'Calibri', 'Trebuchet MS',
        sans-serif !important;
      background-color: black;
    "
  >
    <img
      src="https://igrejareviver.org/wp-content/uploads/2018/07/Logo-Site-Defult.png"
      srcset="
        https://igrejareviver.org/wp-content/uploads/2018/07/Logo-Site-Defult.png 1x,
        https://igrejareviver.org/wp-content/uploads/2018/07/Logo-Site-Retina.png 2x
      "
      width="307"
      height="110"
      style="
        max-height: 110px;
        height: auto;
        position: absolute;
        margin: 20px 10px;
      "
      alt="Igreja Reviver Logo"
      retina_logo_url="https://igrejareviver.org/wp-content/uploads/2018/07/Logo-Site-Retina.png"
      class="fusion-standard-logo"
    />
    <div class="background background-image">
      <div class="container">
        <div class="buttons">
          <div class="button" style="display: flex; flex-wrap: wrap">
            <a
              class="waves-effect waves-light btn-large"
              href="http://reservas.igrejareviver.org"
              style="width: 100%; margin-top: 5px"
            >
              INSCRIÇÃO PRESENCIAL DE DOMINGO</a
            >
            <a
              class="waves-effect waves-light btn-large"
              href="http://reviverkids.igrejareviver.org"
              style="width: 100%; margin-top: 5px"
              >Inscrição ReviverKids</a
            >
          </div>
          <hr />
          <div class="button">
            <a
              class="waves-effect waves-light btn-large"
              style="width: 100%"
              href="https://www.youtube.com/user/IgrejaReviverSAC"
              >TRANSMISSÃO ONLINE</a
            >
          </div>
          <div class="button">
            <a
              class="waves-effect waves-light btn-large"
              style="width: 100%"
              href="https://www.youtube.com/user/IgrejaReviverSAC"
              >YOUTUBE</a
            >
          </div>
          <div class="button">
            <a
              class="waves-effect waves-light btn-large"
              style="width: 100%"
              href="https://www.facebook.com/IgrejaReviver "
              >FACEBOOK</a
            >
          </div>
          <div class="button">
            <a
              class="waves-effect waves-light btn-large"
              style="width: 100%"
              href="http://www.igrejareviver.org"
              >SITE</a
            >
          </div>
        </div>
      </div>
    </div>

    <!--JavaScript at end of body for optimized loading-->
    <script type="text/javascript" src="dist/js/materialize.min.js"></script>
  </body>
</html>
